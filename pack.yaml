name: Tutorial & Demo Video Studio
slug: tutorial-video-studio
category: design   # cross-listed candidate: coding (Remotion members)
description: >-
  Make a narrated tutorial or product demo end to end — plan the beats, record a
  clean screencast, script and pace the voiceover, direct the on-screen action,
  apply motion and on-screen labels, score and mix the audio, generate accurate
  captions, and render and reframe for delivery. Install when someone wants to
  produce a how-to video, feature walkthrough, onboarding clip, or release demo
  and needs the whole pipeline rather than one piece.

